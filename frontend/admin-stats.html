<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Statystyki – Panel admina</title>

  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="admin-nav">
  <a href="admin-calendar.html">Kalendarz</a>
  <a href="admin-appointments.html">Rezerwacje</a>
  <a href="admin-hairdressers.html">Fryzjerzy</a>
  <a href="admin-services.html">Cennik</a>
  <a href="admin-stats.html" class="active">Statystyki</a>
      <button onclick="logout()">Wyloguj</button>
</nav>

<main class="container">
  <h1>Statystyki wizyt</h1>

  <section class="stats-box filters">
    <label>
      Data od:
      <input type="date" id="from">
    </label>

    <label>
      Data do:
      <input type="date" id="to">
    </label>

    <button id="loadBtn" onclick="loadStats()">Pokaż statystyki</button>
  </section>

  <section class="stats-box">
    <h2>Wizyty tygodniowe</h2>
    <div class="chart-box">
      <canvas id="weekChart"></canvas>
    </div>
  </section>

  <section class="stats-box">
    <h2>Wizyty miesięczne</h2>
    <div class="chart-box">
      <canvas id="monthChart"></canvas>
    </div>
  </section>

  <section class="stats-box">
    <h2>Ranking fryzjerów</h2>
    <div class="chart-box">
      <canvas id="hairdresserChart"></canvas>
    </div>
  </section>
</main>

<script src="js/admin-stats.js"></script>
<script src="js/api.js"></script>


</body>
</html>
