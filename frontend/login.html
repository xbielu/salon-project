<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-bg">

<div class="login-box">
    <h2>Logowanie</h2>

    <label>Email</label>
    <input id="email">

    <label>Hasło</label>
    <input id="password" type="password">

    <button onclick="login()">Zaloguj</button>

    <p id="error" class="error"></p>
    <a href="index.html" class="back-home">← Powrót do strony głównej</a>

</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:3000/auth/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!data.success) {
        document.getElementById("error").textContent = "Błędne dane!";
        return;
    }

    if (data.type === "admin") {
        localStorage.setItem("isAdmin", "true");
        window.location.href = "admin-calendar.html";
    }

    if (data.type === "hairdresser") {
        localStorage.setItem("hairdresser_id", data.hairdresser.id);
        window.location.href = "hairdresser-panel.html";
    }
}
</script>

</body>
</html>
