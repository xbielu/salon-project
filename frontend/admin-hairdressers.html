<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Fryzjerzy — Panel Admina</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="admin-nav">
    <a href="admin-calendar.html">Kalendarz</a>
    <a href="admin-appointments.html">Rezerwacje</a>
    <a href="admin-hairdressers.html">Fryzjerzy</a>
    <a href="admin-services.html">Cennik</a>
    <a href="admin-stats.html">Statystyki</a>

    <button onclick="logout()">Wyloguj</button>
</nav>


<h2 class="page-title">Fryzjerzy</h2>

<div class="content-wrap">

    <div class="box admin-form">
        <h3>Dodaj / edytuj fryzjera</h3>

        <input type="hidden" id="hd-id">

        <label>Imię</label>
        <input id="hd-first">

        <label>Nazwisko</label>
        <input id="hd-last">

        <label>Email</label>
        <input id="hd-email" type="email">

        <label>Hasło (przy edycji można zostawić puste)</label>
        <input id="hd-pass" type="password">

        <label>Link do zdjęcia</label>
        <input id="hd-photo">

        <label>Opis</label>
        <textarea id="hd-desc"></textarea>

        <button onclick="saveHairdresser()">Zapisz</button>
        <button onclick="deleteHairdresser()" class="warn">Usuń</button>
        <button onclick="clearForm()">Wyczyść formularz</button>
    </div>

    <div class="box" style="flex:1;">
        <h3>Lista fryzjerów</h3>
        <div id="hairdressersList" class="cards"></div>
    </div>

</div>

<script src="js/admin-hairdressers.js"></script>

</body>
</html>
