<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kalendarz – Panel Admina</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="admin-nav">
  <a href="admin-calendar.html" class="active">Kalendarz</a>
  <a href="admin-appointments.html">Rezerwacje</a>
  <a href="admin-hairdressers.html">Fryzjerzy</a>
  <a href="admin-services.html">Cennik</a>
  <a href="admin-stats.html">Statystyki</a>

  <button onclick="logout()">Wyloguj</button>
</nav>

<h2 class="page-title">Grafik fryzjerów</h2>

<div class="wrap">

  <div class="calendar">
    <div class="cal-header">
      <button onclick="prevMonth()">‹</button>
      <h3 id="monthTitle"></h3>
      <button onclick="nextMonth()">›</button>
    </div>

    <button class="today-btn" onclick="goToday()">Dzisiaj</button>
    <div id="calendarGrid" class="grid"></div>
  </div>

  <div class="sidebar">

    <div class="box">
      <h3 id="selectedDateTitle">Wybierz dzień</h3>
      <div id="dayInfo"></div>
    </div>

   <div class="box schedule-form">

      <h4>Dodaj / edytuj grafik</h4>

      <label>Fryzjer</label>
      <select id="sch-hairdresser"></select>

      <label>Data</label>
      <input id="sch-date" type="date">

      <label>Od</label>
      <input id="sch-start" type="time">

      <label>Do</label>
      <input id="sch-end" type="time">

      <input type="hidden" id="sch-id">

      <button onclick="saveSchedule()">Zapisz</button>
      <button class="warn" onclick="deleteSchedule()">Usuń</button>
    </div>

  </div>
</div>

<script src="js/admin-calendar.js"></script>
<script src="js/api.js"></script>


</body>
</html>
